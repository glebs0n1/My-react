<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <!-- Favicons / PWA -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <meta name="theme-color" content="#6d0ef1" />

  <!-- Performance: pre-connect to image CDNs we use -->
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
  <link rel="dns-prefetch" href="https://images.unsplash.com" />

  <!-- Default SEO (overridden per-page via react-helmet-async). Kept lean to avoid
       duplicate-tag conflicts; per-page <Seo> sets title, description, canonical,
       OG, Twitter, robots and JSON-LD. -->
  <title>PetLietuva | Gyvūnų prieglaudos, veterinarai ir paslaugos Lietuvoje</title>
  <meta name="description" content="PetLietuva – didžiausia gyvūnų bendruomenės platforma Lietuvoje. Veterinarai, gyvūnų prieglaudos, dresūra, kirpyklos ir įvaikinimas vienoje vietoje." />
  <meta name="author" content="PetLietuva" />
  <meta name="language" content="Lithuanian" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <link rel="canonical" href="https://petlietuva.lt/" />

  <!-- Baseline Open Graph (per-page Seo will override these) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="PetLietuva" />
  <meta property="og:locale" content="lt_LT" />
  <meta property="og:url" content="https://petlietuva.lt/" />
  <meta property="og:title" content="PetLietuva | Gyvūnų prieglaudos, veterinarai ir paslaugos Lietuvoje" />
  <meta property="og:description" content="Didžiausia gyvūnų bendruomenės platforma Lietuvoje. Veterinarai, prieglaudos, dresūra, kirpyklos ir įvaikinimas vienoje vietoje." />
  <meta property="og:image" content="https://petlietuva.lt/og-image.jpg" />

  <!-- Baseline Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="PetLietuva | Gyvūnų prieglaudos, veterinarai ir paslaugos Lietuvoje" />
  <meta name="twitter:description" content="Didžiausia gyvūnų bendruomenės platforma Lietuvoje." />
  <meta name="twitter:image" content="https://petlietuva.lt/og-image.jpg" />
</head>
<body>
  <noscript>Norėdami naudotis PetLietuva platforma, įjunkite „JavaScript".</noscript>
  <div id="root"></div>
</body>
</html>
